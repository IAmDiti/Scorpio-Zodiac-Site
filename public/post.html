<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorpio Zodiac — Blog</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div id="app">

  <nav>
    <a href="/" class="logo"><span class="logo-g">♏</span> Scorpio Zodiac</a>
    <div class="nav-links">
      <a href="/"          class="nav-link">Horoscope</a>
      <a href="/blog.html" class="nav-link active">Blog</a>
      <a href="/quiz.html" class="nav-link">Quizzes</a>
    </div>
    <div class="nav-right" id="navRight">
      <button class="btn btn-o" onclick="openModal('login')">Sign In</button>
      <button class="btn btn-f" onclick="openModal('signup')">Join Free</button>
    </div>
  </nav>

  <div class="wrap" style="padding-top:32px;padding-bottom:60px" id="postContainer">
    <p class="reading" style="color:var(--textd);font-style:italic;text-align:center;padding:60px 0">Loading article...</p>
  </div>

  <footer>
    <div class="fl">♏ Scorpio Zodiac</div>
    <nav class="fn"><a href="/">Horoscope</a><a href="/blog.html">Blog</a><a href="/quiz.html">Quizzes</a></nav>
    <p>Guided by the stars. Built for the depths. © <span id="ftY"></span> Scorpio Zodiac</p>
  </footer>
</div>

<!-- AUTH MODAL -->
<div class="mbg" id="authModal">
  <div class="modal">
    <button class="mx" onclick="closeModal()">✕</button>
    <div class="mg">♏</div>
    <h2>Scorpio Zodiac</h2>
    <p class="msub">Your full cosmic truth awaits</p>
    <div class="sw">
      <button class="swb active" id="sw1" onclick="switchTab('login')">Sign In</button>
      <button class="swb" id="sw2" onclick="switchTab('signup')">Join Free</button>
    </div>
    <div id="fLogin">
      <div class="fg"><label>Email</label><input type="email" id="lEmail" placeholder="you@cosmos.com"></div>
      <div class="fg"><label>Password</label><input type="password" id="lPass" placeholder="••••••••"></div>
      <div class="err hidden" id="lErr"></div>
      <button class="btn btn-f btn-block" id="btnLogin" onclick="doLogin()">Enter ♏</button>
    </div>
    <div id="fSignup" class="hidden">
      <div class="fg"><label>Your Name</label><input type="text" id="sName" placeholder="Scorpio Seeker"></div>
      <div class="fg"><label>Email</label><input type="email" id="sEmail" placeholder="you@cosmos.com"></div>
      <div class="fg"><label>Password</label><input type="password" id="sPass" placeholder="Min. 6 characters"></div>
      <div class="err hidden" id="sErr"></div>
      <button class="btn btn-f btn-block" id="btnSignup" onclick="doSignup()">Begin My Journey</button>
    </div>
    <div id="fForgot" class="hidden">
      <button class="bbtn" onclick="switchTab('login')">← Back</button>
      <div class="fg"><label>Email</label><input type="email" id="fEmail" placeholder="you@cosmos.com"></div>
      <div class="err hidden" id="fErr"></div>
      <div class="okm hidden" id="fOk"></div>
      <button class="btn btn-f btn-block" id="btnForgot" onclick="doForgot()">Send Reset Link</button>
    </div>
  </div>
</div>
<div class="mbg" id="profModal"><div class="modal"><button class="mx" onclick="closeProfileModal()">✕</button><div class="mg">♏</div><h2>My Profile</h2><p class="msub">Update your cosmic details</p><div class="fg"><label>Name</label><input type="text" id="pName"></div><div class="fg"><label>Email</label><input type="email" id="pEmail"></div><div class="fg"><label>Birth Date</label><input type="date" id="pBirth"></div><div class="fg"><label>New Password</label><input type="password" id="pPass"></div><div class="fg"><label>Confirm</label><input type="password" id="pPass2"></div><div class="err hidden" id="pErr"></div><div class="okm hidden" id="pOk"></div><button class="btn btn-f btn-block" id="btnProf" onclick="doSaveProfile()">Save Changes ✦</button><div style="height:1px;background:var(--bdr);margin:14px 0"></div><button class="btn btn-o btn-block" onclick="doLogout()">Log Out</button></div></div>
<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  ;(function(){ const el=document.getElementById('ftY'); if(el) el.textContent=new Date().getFullYear() })()
  ;(function(){
    const el = document.getElementById('stars')
    if (!el) return
    for (let i=0;i<80;i++){
      const s=document.createElement('div'); s.className='star'
      const sz=Math.random()*1.8+0.3
      s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${3+Math.random()*5}s;animation-delay:${Math.random()*6}s`
      el.appendChild(s)
    }
  })()

  document.addEventListener('authReady', async () => {
    const slug = new URLSearchParams(window.location.search).get('slug')
    const container = document.getElementById('postContainer')
    if (!slug) { container.innerHTML = '<p style="text-align:center;color:var(--textd);padding:60px 0">No article specified. <a href="/blog.html" style="color:var(--lav)">Back to blog</a></p>'; return }

    const { ok, data } = await API.post(slug)
    if (!ok || !data.post) {
      container.innerHTML = '<p style="text-align:center;color:var(--textd);padding:60px 0">Article not found. <a href="/blog.html" style="color:var(--lav)">Back to blog</a></p>'
      return
    }

    const p = data.post
    document.title = `${p.title} | Scorpio Zodiac`

    container.innerHTML = `
      <a href="/blog.html" style="font-family:'DM Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--textd);text-decoration:none;display:inline-block;margin-bottom:20px">← Back to Blog</a>

      <header style="margin-bottom:28px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
          <span class="bc-tag" style="background:linear-gradient(135deg,#3d3055,#4a3048);border-color:#6b5580;color:var(--lav)">${p.tag_label||p.category||'Astrology'}</span>
          <span class="bc-d">${new Date(p.published_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</span>
          <span class="bc-r">${p.read_time||'5 min read'}</span>
        </div>
        <h1 style="font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--ivory);line-height:1.2;margin-bottom:12px">${p.title}</h1>
        ${p.excerpt ? `<p style="font-size:1rem;color:var(--texts);font-style:italic;line-height:1.75;padding-bottom:20px;border-bottom:1px solid var(--bdr)">${p.excerpt}</p>` : ''}
      </header>

      <article style="margin-bottom:40px">
        <style>
          article p      { color:#9d94b4; line-height:1.9; margin-bottom:16px; font-size:1rem; }
          article h2     { font-family:'Playfair Display',serif; color:#e8e0d5; font-size:1.2rem; margin:28px 0 12px; padding-left:14px; border-left:2px solid #7a6d9a; }
          article strong { color:#ddd5e8; font-weight:500; }
          article blockquote { border-left:3px solid #7a6d9a; padding:12px 18px; margin:18px 0; background:#1e1b2e; border-radius:0 10px 10px 0; font-style:italic; color:#9d94b4; }
        </style>
        ${p.content || '<p>Full article coming soon.</p>'}
      </article>

      <div style="background:linear-gradient(135deg,#1e1a30,#1a1528);border:1px solid #3a3258;border-radius:var(--rl);padding:28px;text-align:center">
        <div style="font-size:1.4rem;color:var(--lav);margin-bottom:10px">♏</div>
        <p style="color:var(--texts);font-style:italic;margin-bottom:14px;font-size:.9rem">Get your personalized Scorpio daily reading — it's free.</p>
        <a href="/" class="btn btn-f" style="text-decoration:none">Get My Free Reading</a>
      </div>
    `
  }, { once: true })
</script>
</body>
</html>
