<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <style>
    body { background:#12101a; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; font-family:Georgia,serif; color:#a897c8; }
    p { font-size:1rem; }
  </style>
</head>
<body>
<p>Signing you in...</p>
<script>
async function handleCallback() {
  // Handle hash-based token (implicit flow from Supabase)
  const hash = window.location.hash.substring(1)
  const params = new URLSearchParams(hash)
  const accessToken = params.get('access_token')

  // Also check query params (code flow)
  const queryParams = new URLSearchParams(window.location.search)
  const code = queryParams.get('code')
  const error = queryParams.get('error')

  // Where to go after login — quiz page or home
  const returnUrl = sessionStorage.getItem('_quizReturnUrl') || '/'

  if (error) {
    window.location.href = '/?error=' + encodeURIComponent(error)
    return
  }

  if (accessToken) {
    try {
      const res  = await fetch('/api/auth/google-token', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ access_token: accessToken })
      })
      const data = await res.json()
      if (data.ok) {
        // Don't remove _quizResult from sessionStorage — quiz.js will read it on load
        sessionStorage.removeItem('_quizReturnUrl')
        window.location.href = returnUrl
      } else {
        window.location.href = '/?error=login_failed'
      }
    } catch (e) {
      window.location.href = '/?error=network_error'
    }
    return
  }

  if (code) {
    // Server handles code exchange — pass returnUrl as query param
    const url = '/auth/callback?code=' + code +
      (returnUrl !== '/' ? '&returnUrl=' + encodeURIComponent(returnUrl) : '')
    sessionStorage.removeItem('_quizReturnUrl')
    window.location.href = url
    return
  }

  // No token or code — go home
  window.location.href = '/'
}

handleCallback()
</script>
</body>
</html>
